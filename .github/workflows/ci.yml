name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TELEMETRY_DISABLED: '1'
  NEXT_TELEMETRY_DISABLED: '1'

jobs:
  quality:
    name: Lint Typecheck Test Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: nexa
          POSTGRES_PASSWORD: nexa
          POSTGRES_DB: nexa
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nexa -d nexa"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://nexa:nexa@localhost:5432/nexa
      REDIS_URL: redis://localhost:6379
      CLERK_SECRET_KEY: sk_test_ci_placeholder
      CLERK_WEBHOOK_SECRET: whsec_ci_placeholder
      ANTHROPIC_API_KEY: sk-ant-ci-placeholder
      OPENAI_API_KEY: sk-ci-placeholder
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ci_placeholder
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.6.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Enable pgvector extension
        env:
          PGPASSWORD: nexa
        run: psql -h localhost -U nexa -d nexa -c "CREATE EXTENSION IF NOT EXISTS vector; CREATE EXTENSION IF NOT EXISTS pgcrypto;"

      - name: Prisma generate
        run: pnpm --filter @nexa/api prisma:generate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Format check
        run: pnpm format:check
